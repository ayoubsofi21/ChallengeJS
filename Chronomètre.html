<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chronomètre</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md text-center">
      <h1 id="time" class="mb-4">00:00:00</h1>

      <button id="start" class="bg-green-500 rounded px-2 text-white">
        Start
      </button>
      <button id="stop" class="bg-red-500 rounded px-2 text-white">Stop</button>
      <button id="reset" class="bg-gray-500 rounded px-2 text-white">
        Reset
      </button>
    </div>

   <script>
  const time = document.getElementById("time");
  const start = document.getElementById("start");
  const stop = document.getElementById("stop");
  const reset = document.getElementById("reset");
  let ms = 0;
  let sec = 0;
  let min = 0;
  let timer;
   function format(n) {
        return n < 10 ? "0" + n : n;
      }
  start.addEventListener("click", () => {
    
    startTimer=()=>{
      ms=ms+10
      console.log(ms)
      if (ms >= 1000) {
          ms = 0;
          sec++;
        }
        if (sec >= 60) {
          sec = 0;
          min++;
        }
      time.textContent=`${format(min)}:${format(sec)}:${format(Math.floor(ms/10))}`
    }
  timer=setInterval(startTimer,10)
  });

  stop.addEventListener("click", () => {
    clearInterval(timer);
  });

  reset.addEventListener("click", () => {
    clearInterval(timer);
    sec = 0;
    min=0
    ms=0
    time.textContent = "00:00:00";
  });
</script>
    </script>
  </body>
</html>
