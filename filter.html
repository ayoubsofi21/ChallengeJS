<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filter</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
      <h2 class="text-2xl font-bold mb-4 text-gray-800">
        Liste des utilisateurs
      </h2>

      <input
        type="text"
        id="searchInput"
        placeholder="Rechercher un nom..."
        class="w-full px-4 py-2 mb-4 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />

      <ul id="nameList" class="divide-y divide-gray-200">
        <li class="py-2 name-item">Alice Dupont</li>
        <li class="py-2 name-item">Bob Martin</li>
        <li class="py-2 name-item">Charlie Durand</li>
        <li class="py-2 name-item">David Moreau</li>
        <li class="py-2 name-item">Eve Lefebvre</li>
      </ul>
    </div>

    <script src="filter.js"></script>
  </body>
</html>
