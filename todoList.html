<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="w-full max-w-md p-8 space-y-6 bg-white shadow-lg rounded-lg">
      <h1 class="text-2xl font-bold text-gray-800">Add Item to List</h1>

      <form id="item-form" class="flex gap-4">
        <input
          type="text"
          id="item-input"
          placeholder="Enter new item"
          class="flex-1 p-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          required
        />
        <button
          type="submit"
          id="add-item-btn"
          class="px-4 py-2 text-white bg-blue-600 rounded-md shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
        >
          Add Item
        </button>
      </form>

      <div class="mt-6">
        <ul id="item-list" class="space-y-3 list-disc list-inside"></ul>
      </div>
    </div>

    <script src="todo-list.js"></script>
  </body>
</html>
