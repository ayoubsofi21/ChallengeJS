<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manipulation de base</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    style="
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    "
  >
    <button
      id="clickButton"
      style="
        background-color: green;
        border-radius: 10px;
        border: none;
        padding: 20px;

        color: white;
      "
    >
      Changer Color
    </button>
    <h1 id="count">0</h1>
    <div>
      <button id="inc">+</button>
      <button id="dec">-</button>
      <button id="reset">Reset</button>
    </div>
    <div>
      <input type="text" />
      <p class="displayText"></p>
    </div>
    <!-- challenge 4 -->
    <div class="card">
      <button class="toggle">Toggle Button</button>
    </div>
    <!-- 5 -->
    <p id="quote">Clique pour une citation</p>
    <button id="generate">Nouvelle citation</button>
    <script src="ManipulationBase.js"></script>
  </body>
</html>
