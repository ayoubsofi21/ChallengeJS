<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Form Validation</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex justify-center items-center h-screen">
    <form class="bg-white p-6 rounded shadow-md w-[300px] space-y-4">
      <h2 class="text-center font-bold text-xl mb-2">Login</h2>

      <div>
        <input
          type="text"
          id="email"
          placeholder="Email"
          class="w-full p-2 border rounded"
        />
        <p id="emailError" class="text-red-500 text-sm hidden">
          Email invalide
        </p>
      </div>

      <div>
        <input
          type="password"
          id="password"
          placeholder="Password"
          class="w-full p-2 border rounded"
        />
        <p id="passError" class="text-red-500 text-sm hidden">
          Mot de passe min 8 caractères
        </p>
      </div>

      <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded">
        Submit
      </button>
    </form>

    <script>
      const email = document.getElementById("email");
      const password = document.getElementById("password");
      const emailError = document.getElementById("emailError");
      const passError = document.getElementById("passError");
      const form = document.querySelector("form");

      function isEmailValid(e) {
        return e.includes("@") && e.includes(".");
      }

      email.addEventListener("input", () => {
        emailError.classList.toggle("hidden", isEmailValid(email.value));
      });

      password.addEventListener("input", () => {
        passError.classList.toggle("hidden", password.value.length >= 8);
      });

      form.addEventListener("submit", (e) => {
        if (!isEmailValid(email.value) || password.value.length < 8) {
          e.preventDefault();
          emailError.classList.toggle("hidden", isEmailValid(email.value));
          passError.classList.toggle("hidden", password.value.length >= 8);
        }
      });
    </script>
  </body>
</html>
