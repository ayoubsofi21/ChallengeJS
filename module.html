<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <button id="openModal" class="bg-blue-500 text-white px-4 py-2 rounded">
      Ouvrir la Modale
    </button>

    <div
      id="modal"
      class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden"
    >
      <div class="bg-white rounded-lg shadow-lg w-96 p-6 relative">
        <button
          id="closeModal"
          class="absolute top-2 right-2 text-gray-500 hover:text-gray-800 text-xl font-bold"
        >
          &times;
        </button>

        <h2 class="text-xl font-bold mb-4">Titre de la Modale</h2>
        <p class="text-gray-700">
          Ceci est une fenêtre surgissante personnalisée. Vous pouvez la fermer
          avec la croix ou en cliquant à l’extérieur.
        </p>
      </div>
    </div>
    <script>
      const openModal = document.getElementById("openModal");
      const modal = document.getElementById("modal");
      const closeModal = document.getElementById("closeModal");
      openModal.addEventListener("click", () => {
        modal.classList.remove("hidden");
        document.body.classList.add("bg-red-500");
      });
      closeModal.addEventListener("click", () => {
        modal.classList.add("hidden");
      });
    </script>
  </body>
</html>
